    <style>
        body { padding-top: 154.6px !important; }
        
        .main-grid {
            display: grid;

<script>
document.addEventListener("DOMContentLoaded", () => {
    // 2. Jump Buttons
    const jumpBtn = document.getElementById('global-jump-btn');
    if (jumpBtn) {
        let isAtBottom = false;
        
        const handleScroll = () => {
            const scrollTop = window.scrollY || document.documentElement.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight;
            const clientHeight = document.documentElement.clientHeight;
            
            if (scrollHeight <= clientHeight + 50) {
                jumpBtn.style.display = 'none';
                return;
            }
            
            jumpBtn.style.display = 'flex';
            
            if (scrollTop > (scrollHeight - clientHeight) / 2) {
                jumpBtn.innerText = '&#9650;';
                jumpBtn.title = 'Jump to Top';
                isAtBottom = true;
            } else {
                jumpBtn.innerText = '&#9660;';
                jumpBtn.title = 'Jump to Bottom';
                isAtBottom = false;
            }
        };
        
        jumpBtn.addEventListener('click', () => {
            if (isAtBottom) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        });
        
        window.addEventListener('scroll', handleScroll);
        window.addEventListener('resize', handleScroll);
        setTimeout(handleScroll, 100);
    }

    // Shared Resources List
    const primaryResources = [
        "Orokin Cell", "Argon Crystal", "Neurodes", "Neural Sensors", 
        "Control Module", "Morphics", "Gallium", "Plastids", 
        "Polymer Bundle", "Rubedo", "Ferrite", "Alloy Plate", 
        "Nano Spores", "Circuits", "Salvage", "Cryotic"
    ];

    // Presets Database
    const presets = {
        excalibur: {
            name: "Warframe: Excalibur",
            ingredients: { "Orokin Cell": 3, "Neurodes": 1, "Nano Spores": 150, "Control Module": 1, "Polymer Bundle": 150, "Rubedo": 800, "Ferrite": 1000, "Alloy Plate": 1000, "Plastids": 220 }
        },
        rhino: {
            name: "Warframe: Rhino",
            ingredients: { "Orokin Cell": 3, "Morphics": 1, "Gallium": 1, "Control Module": 1, "Polymer Bundle": 150, "Rubedo": 800, "Ferrite": 1000, "Alloy Plate": 1000, "Plastids": 600 }
        },
        wukong: {
            name: "Warframe: Wukong",
            ingredients: { "Orokin Cell": 3, "Argon Crystal": 2, "Neural Sensors": 1, "Plastids": 1200, "Polymer Bundle": 4000, "Rubedo": 2500, "Ferrite": 5000, "Nano Spores": 10000, "Circuits": 150 }
        },
        saryn: {
            name: "Warframe: Saryn",
            ingredients: { "Orokin Cell": 3, "Neural Sensors": 1, "Plastids": 1000, "Polymer Bundle": 3000, "Rubedo": 800, "Alloy Plate": 5000, "Salvage": 10000, "Control Module": 1 }
        },
        volt: {
            name: "Warframe: Volt",
            ingredients: { "Orokin Cell": 3, "Argon Crystal": 1, "Neurodes": 1, "Plastids": 500, "Polymer Bundle": 1000, "Rubedo": 800, "Ferrite": 2000, "Salvage": 5000, "Control Module": 1 }
        },
        soma: {
            name: "Primary: Soma",
            ingredients: { "Orokin Cell": 1, "Morphics": 7, "Plastids": 600, "Rubedo": 1200, "Polymer Bundle": 1000, "Alloy Plate": 7500, "Cryotic": 200 }
        },
        torid: {
            name: "Primary: Torid",
            ingredients: { "Orokin Cell": 1, "Control Module": 10, "Plastids": 1200, "Nano Spores": 8000 }
        },
        ignis_wraith: {
            name: "Primary: Ignis Wraith",
            ingredients: { "Orokin Cell": 3, "Circuits": 150, "Polymer Bundle": 1200, "Nano Spores": 4500 }
        },
        redeemer: {
            name: "Melee: Redeemer",
            ingredients: { "Argon Crystal": 1, "Morphics": 2, "Rubedo": 500 }
        }
    };

    // Load queue & owned items from safeStorage
    let queue = JSON.parse(safeStorage.getItem('codex_foundry_queue')) || [];
    let owned = JSON.parse(safeStorage.getItem('codex_foundry_owned')) || {};

    // Populate Custom Input Fields
    const customContainer = document.getElementById('custom-inputs-container');
    primaryResources.forEach(res => {
        customContainer.innerHTML += `
            <div class="custom-resource-box">
                <span>${res}</span>
                <input type="number" id="custom-${res.replace(/\s+/g, '')}" min="0" value="0" class="custom-resource-input">
            </div>
        `;
    });

    const presetSelect = document.getElementById('preset-select');
    const btnAddPreset = document.getElementById('btn-add-preset');
    const customName = document.getElementById('custom-name');
    const btnAddCustom = document.getElementById('btn-add-custom');
    const queueContainer = document.getElementById('queue-container');
    const btnClearQueue = document.getElementById('btn-clear-queue');
    const shoppingContainer = document.getElementById('shopping-list-container');
    const btnCopyList = document.getElementById('btn-copy-list');

    // Add preset listener
    btnAddPreset.addEventListener('click', () => {
        const val = presetSelect.value;
        if (!val) return;

        const presetItem = presets[val];
        const newItem = {
            id: Date.now().toString() + Math.random().toString(36).substring(2, 5),
            name: presetItem.name,
            ingredients: { ...presetItem.ingredients }
        };

        queue.push(newItem);
        saveQueue();
        render();
    });

    // Add custom listener
    btnAddCustom.addEventListener('click', () => {
        const name = customName.value.trim();
        if (!name) {
            alert("Please enter a name for the custom item.");
            return;
        }

        const ingredients = {};
        primaryResources.forEach(res => {
            const inputVal = parseInt(document.getElementById(`custom-${res.replace(/\s+/g, '')}`).value) || 0;
            if (inputVal > 0) {
                ingredients[res] = inputVal;
            }
        });

        if (Object.keys(ingredients).length === 0) {
            alert("Please input at least one ingredient count.");
            return;
        }

        const newItem = {
            id: Date.now().toString() + Math.random().toString(36).substring(2, 5),
            name: name,
            ingredients: ingredients
        };

        queue.push(newItem);
        saveQueue();
        
        // Reset custom inputs
        customName.value = '';
        primaryResources.forEach(res => {
            document.getElementById(`custom-${res.replace(/\s+/g, '')}`).value = 0;
        });

        render();
    });

    // Clear all listener
    btnClearQueue.addEventListener('click', () => {
        if (queue.length > 0 && confirm("Are you sure you want to clear the entire crafting queue?")) {
            queue = [];
            saveQueue();
            render();
        }
    });

    // Copy list to clipboard
    btnCopyList.addEventListener('click', () => {
        if (queue.length === 0) {
            alert("Crafting queue is empty.");
            return;
        }

        const aggregated = aggregateResources();
        let txt = `&#9881;&#65039; WARFRAME FOUNDRY PLANNER WORKSHEET\n`;
        txt += `Active Queue:\n`;
        queue.forEach((item, idx) => {
            txt += `  [ ] ${idx + 1}. ${item.name}\n`;
        });
        
        txt += `\nResource Requirements:\n`;
        Object.keys(aggregated).forEach(res => {
            const req = aggregated[res];
            const own = owned[res] || 0;
            const status = own >= req ? "DONE" : `${own}/${req}`;
            txt += `  [ ] ${res}: ${status} required\n`;
        });

        navigator.clipboard.writeText(txt).then(() => {
            alert("Planner checklist copied to clipboard!");
        });
    });

    // Save helpers
    function saveQueue() {
        safeStorage.setItem('codex_foundry_queue', JSON.stringify(queue));
    }

    function saveOwned() {
        safeStorage.setItem('codex_foundry_owned', JSON.stringify(owned));
    }

    // Aggregate resources needed across all items in the queue
    function aggregateResources() {
        const aggregated = {};
        queue.forEach(item => {
            Object.keys(item.ingredients).forEach(res => {
                aggregated[res] = (aggregated[res] || 0) + item.ingredients[res];
            });
        });
        return aggregated;
    }

    // Main render function
    function render() {
        // Render Queue
        queueContainer.innerHTML = '';
        if (queue.length === 0) {
            queueContainer.innerHTML = `<div style="text-align: center; color: #94a3b8; font-size: 0.88rem; padding: 20px;">Queue is empty. Select a preset or create a custom item to begin!</div>`;
        } else {
            queue.forEach(item => {
                const detailsStr = Object.entries(item.ingredients)
                    .map(([name, count]) => `${name} x${count}`)
                    .join(", ");
                
                queueContainer.innerHTML += `
                    <div class="queue-item">
                        <div>
                            <div class="queue-title">${item.name}</div>
                            <div class="queue-details">${detailsStr}</div>
                        </div>
                        <button class="remove-btn" onclick="removeItem('${item.id}')">&times;</button>
                    </div>
                `;
            });
        }

        // Render Shopping List
        shoppingContainer.innerHTML = '';
        const aggregated = aggregateResources();
        const sortedResources = Object.keys(aggregated).sort();

        if (sortedResources.length === 0) {
            shoppingContainer.innerHTML = `<div style="text-align: center; color: #94a3b8; font-size: 0.95rem; padding: 40px;">No resources required. Add items to your crafting queue to see combined totals.</div>`;
        } else {
            sortedResources.forEach(res => {
                const reqVal = aggregated[res];
                const ownVal = owned[res] || 0;
                const progressPercent = Math.min(100, Math.max(0, (ownVal / reqVal) * 100));
                
                const isComplete = ownVal >= reqVal;
                const statusBadgeClass = isComplete ? 'badge-done' : 'badge-farming';
                const statusBadgeText = isComplete ? 'Complete' : 'Farming';
                const progressFillClass = isComplete ? 'progress-fill progress-complete' : 'progress-fill';

                shoppingContainer.innerHTML += `
                    <div class="shopping-row">
                        <div class="shopping-meta">
                            <span class="resource-title">${res}</span>
                            <div class="owned-controls">
                                <span class="needed-label">Owned:</span>
                                <input type="number" class="owned-field" min="0" value="${ownVal}" data-res="${res}">
                                <span class="needed-label">/ ${reqVal}</span>
                                <span class="badge-status ${statusBadgeClass}">${statusBadgeText}</span>
                            </div>
                        </div>
                        <div class="progress-container">
                            <div class="${progressFillClass}" style="width: ${progressPercent}%;"></div>
                        </div>
                    </div>
                `;
            });

            // Set up input change events for owned fields
            const ownedFields = document.querySelectorAll('.owned-field');
            ownedFields.forEach(field => {
                field.addEventListener('input', (e) => {
                    const resName = e.target.dataset.res;
                    const val = Math.max(0, parseInt(e.target.value) || 0);
                    owned[resName] = val;
                    saveOwned();
                    
                    // Live update the progress bar without full re-render for performance
                    const row = e.target.closest('.shopping-row');
                    const reqVal = aggregated[resName];
                    const progressPercent = Math.min(100, Math.max(0, (val / reqVal) * 100));
                    
                    const fill = row.querySelector('.progress-fill');
                    fill.style.width = progressPercent + '%';
                    
                    const badge = row.querySelector('.badge-status');
                    if (val >= reqVal) {
                        badge.className = 'badge-status badge-done';
                        badge.textContent = 'Complete';
                        fill.classList.add('progress-complete');
                    } else {
                        badge.className = 'badge-status badge-farming';
                        badge.textContent = 'Farming';
                        fill.classList.remove('progress-complete');
                    }
                });
            });
        }
    }

    // Expose remove function globally
    window.removeItem = function(id) {
        queue = queue.filter(item => item.id !== id);
        saveQueue();
        render();
    };

    // Initial render
    render();
});
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const guideSequence = window.GUIDE_SEQUENCE || [];
    const currentFile = window.location.pathname.split('/').pop() || '!Warframe_Master_Index.html';
    let matchFile = currentFile;
    if (currentFile.toLowerCase() === 'Warframe_Tenno_Foundry.html') {
        matchFile = 'Warframe_Tenno_Foundry.html';
    }
    const currentIndex = guideSequence.findIndex(f => f.toLowerCase() === matchFile.toLowerCase());

    const prevEl = document.getElementById('nav-prev');
    const nextEl = document.getElementById('nav-next');
    const prevTopEl = document.getElementById('nav-prev-top');
    const nextTopEl = document.getElementById('nav-next-top');
    
    if (currentIndex !== -1) {
        if (currentIndex > 0) {
            if (prevEl) prevEl.href = guideSequence[currentIndex - 1];
            if (prevTopEl) {
                prevTopEl.href = guideSequence[currentIndex - 1];
                prevTopEl.classList.remove('disabled');
            }
        } else {
            if (prevEl) prevEl.classList.add('disabled');
            if (prevTopEl) prevTopEl.classList.add('disabled');
        }
        if (currentIndex < guideSequence.length - 1) {
            if (nextEl) nextEl.href = guideSequence[currentIndex + 1];
            if (nextTopEl) {
                nextTopEl.href = guideSequence[currentIndex + 1];
                nextTopEl.classList.remove('disabled');
            }
        } else {
            if (nextEl) nextEl.classList.add('disabled');
            if (nextTopEl) nextTopEl.classList.add('disabled');
        }
    } else {
        if (prevEl) prevEl.classList.add('disabled');
        if (nextEl) nextEl.classList.add('disabled');
        if (prevTopEl) prevTopEl.classList.add('disabled');
        if (nextTopEl) nextTopEl.classList.add('disabled');
    }
});

</script>
