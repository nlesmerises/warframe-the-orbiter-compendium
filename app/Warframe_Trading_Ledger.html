        .stat-value.profit { color: #34d399; }

        .input-group { display: flex; flex-direction: column; flex: 1; }
        .input-group label { font-family: 'Inter', sans-serif; font-size: 0.85rem; color: #94a3b8; margin-bottom: 8px; }
        .input-group input, .input-group select { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 6px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
        .input-group input:focus, .input-group select:focus { border-color: #00e8fc; }
        .add-btn { background: #00e8fc; color: #080a10; border: none; padding: 12px 30px; border-radius: 6px; font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.2s; height: 43px; }
        .add-btn:hover { background: #fff; box-shadow: 0 0 15px rgba(0, 232, 252, 0.5); }

        /* History Table */
        .history-table { width: 100%; border-collapse: collapse; font-family: 'Inter', sans-serif; }
        .history-table th { text-align: left; padding: 15px; border-bottom: 2px solid rgba(255,255,255,0.1); color: #94a3b8; font-weight: 500; }
        .history-table td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #e2e8f0; }
        .history-table tr:hover td { background: rgba(255,255,255,0.02); }
        .type-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .type-sell { background: rgba(52, 211, 153, 0.1); color: #34d399; border: 1px solid #34d399; }
        .type-buy { background: rgba(244, 63, 94, 0.1); color: #f43f5e; border: 1px solid #f43f5e; }
        .del-btn { background: none; border: none; color: #f43f5e; cursor: pointer; font-size: 1.2rem; opacity: 0.5; transition: opacity 0.2s; }
        .del-btn:hover { opacity: 1; }
        
        .empty-state { text-align: center; padding: 40px; color: #64748b; font-style: italic; }

<div class="container" style="max-width:1750px;">
        <header>
            <h1>&#128210; Platinum &amp; Trading Ledger</h1>
            <p class="subtitle">Track platinum income, trades, and market transactions across sessions</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">Total Platinum Earned</div>
                <div class="stat-value profit" id="stat-earned">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Total Platinum Spent</div>
                <div class="stat-value spent" id="stat-spent">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Net Profit Margin</div>
                <div class="stat-value net" id="stat-net">0</div>
            </div>
        </div>

        <form class="form-area" id="transactionForm">
            <div class="input-group" style="flex: 0.5;">
                <label>Type</label>
                <select id="tType" required>
                    <option value="sell">WTS (Sold)</option>
                    <option value="buy">WTB (Bought)</option>
                </select>
            </div>
            <div class="input-group" style="flex: 2;">
                <label>Item Name / Trade Note</label>
                <input type="text" id="tName" placeholder="e.g. Glaive Prime Set" required autocomplete="off">
            </div>
            <div class="input-group" style="flex: 0.7;">
                <label>Platinum (pt)</label>
                <input type="number" id="tAmount" placeholder="e.g. 150" min="1" required>
            </div>
            <div class="input-group" style="flex: 0.8;">
                <label>Date</label>
                <input type="date" id="tDate" required>
            </div>
            <button type="submit" class="add-btn">Add Log</button>
        </form>

        <table class="history-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Item / Notes</th>
                    <th>Platinum</th>
                    <th style="width: 50px;"></th>
                </tr>
            </thead>
            <tbody id="historyBody">
                <!-- Injected via JS -->
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Set default date to today
            document.getElementById('tDate').valueAsDate = new Date();

            const form = document.getElementById('transactionForm');
            const tbody = document.getElementById('historyBody');
            const stEarned = document.getElementById('stat-earned');
            const stSpent = document.getElementById('stat-spent');
            const stNet = document.getElementById('stat-net');

            let transactions = JSON.parse(safeStorage.getItem('warframe_trading_ledger')) || [];

            function render() {
                tbody.innerHTML = '';
                let earned = 0;
                let spent = 0;

                if (transactions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No transactions logged yet. Add your first trade above!</td></tr>';
                } else {
                    // Sort descending by date
                    transactions.sort((a, b) => new Date(b.date) - new Date(a.date));

                    transactions.forEach(t => {
                        if (t.type === 'sell') earned += t.amount;
                        if (t.type === 'buy') spent += t.amount;

                        const tr = document.createElement('tr');
                        const typeClass = t.type === 'sell' ? 'type-sell' : 'type-buy';
                        const typeLabel = t.type === 'sell' ? 'Sold' : 'Bought';
                        const sign = t.type === 'sell' ? '+' : '-';
                        const color = t.type === 'sell' ? '#34d399' : '#f43f5e';

                        tr.innerHTML = `
                            <td>${t.date}</td>
                            <td><span class="type-badge ${typeClass}">${typeLabel}</span></td>
                            <td><strong>${t.name}</strong></td>
                            <td style="color: ${color}; font-weight: bold; font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;">${sign}${t.amount} pt</td>
                            <td><button class="del-btn" onclick="deleteItem('${t.id}')">&times;</button></td>
                        `;
                        tbody.appendChild(tr);
                    });
                }

                stEarned.innerText = earned;
                stSpent.innerText = spent;
                const net = earned - spent;
                stNet.innerText = (net > 0 ? '+' : '') + net;
                stNet.style.color = net < 0 ? '#f43f5e' : (net > 0 ? '#34d399' : '#00e8fc');
            }

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const newT = {
                    id: Date.now().toString(),
                    type: document.getElementById('tType').value,
                    name: document.getElementById('tName').value,
                    amount: parseInt(document.getElementById('tAmount').value),
                    date: document.getElementById('tDate').value
                };
                transactions.push(newT);
                safeStorage.setItem('warframe_trading_ledger', JSON.stringify(transactions));
                document.getElementById('tName').value = '';
                document.getElementById('tAmount').value = '';
                render();
            });

            window.deleteItem = function(id) {
                transactions = transactions.filter(t => t.id !== id);
                safeStorage.setItem('warframe_trading_ledger', JSON.stringify(transactions));
                render();
            };

            render();
        });
    </script>



<script>
document.addEventListener("DOMContentLoaded", () => {
    // 2. Jump Buttons
    const jumpBtn = document.getElementById('global-jump-btn');
    if (jumpBtn) {
        let isAtBottom = false;
        
        const handleScroll = () => {
            const scrollTop = window.scrollY || document.documentElement.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight;
            const clientHeight = document.documentElement.clientHeight;
            
            if (scrollHeight <= clientHeight + 50) {
                jumpBtn.style.display = 'none';
                return;
            }
            
            jumpBtn.style.display = 'flex';
            
            if (scrollTop > (scrollHeight - clientHeight) / 2) {
                jumpBtn.innerText = '&#9650;';
                jumpBtn.title = 'Jump to Top';
                isAtBottom = true;
            } else {
                jumpBtn.innerText = '&#9660;';
                jumpBtn.title = 'Jump to Bottom';
                isAtBottom = false;
            }
        };
        
        jumpBtn.addEventListener('click', () => {
            if (isAtBottom) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        });
        
        window.addEventListener('scroll', handleScroll);
        window.addEventListener('resize', handleScroll);
        setTimeout(handleScroll, 100);
    }

    const guideSequence = window.GUIDE_SEQUENCE || [];
    const currentFile = window.location.pathname.split('/').pop() || '!Warframe_Master_Index.html';
    let matchFile = currentFile;
    if (currentFile.toLowerCase() === 'Warframe_Tenno_Foundry.html') {
        matchFile = 'Warframe_Tenno_Foundry.html';
    }
    const currentIndex = guideSequence.findIndex(f => f.toLowerCase() === matchFile.toLowerCase());

    const prevEl = document.getElementById('nav-prev');
    const nextEl = document.getElementById('nav-next');
    const prevTopEl = document.getElementById('nav-prev-top');
    const nextTopEl = document.getElementById('nav-next-top');
    
    if (currentIndex !== -1) {
        if (currentIndex > 0) {
            if (prevEl) prevEl.href = guideSequence[currentIndex - 1];
            if (prevTopEl) {
                prevTopEl.href = guideSequence[currentIndex - 1];
                prevTopEl.classList.remove('disabled');
            }
        } else {
            if (prevEl) prevEl.classList.add('disabled');
            if (prevTopEl) prevTopEl.classList.add('disabled');
        }
        if (currentIndex < guideSequence.length - 1) {
            if (nextEl) nextEl.href = guideSequence[currentIndex + 1];
            if (nextTopEl) {
                nextTopEl.href = guideSequence[currentIndex + 1];
                nextTopEl.classList.remove('disabled');
            }
        } else {
            if (nextEl) nextEl.classList.add('disabled');
            if (nextTopEl) nextTopEl.classList.add('disabled');
        }
    } else {
        if (prevEl) prevEl.classList.add('disabled');
        if (nextEl) nextEl.classList.add('disabled');
        if (prevTopEl) prevTopEl.classList.add('disabled');
        if (nextTopEl) nextTopEl.classList.add('disabled');
    }
});

</script>
