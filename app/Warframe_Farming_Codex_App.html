    <script>
    (function() {
        try {
            const testKey = '__storage_test__';
            localStorage.setItem(testKey, testKey);
            localStorage.removeItem(testKey);
            const hasData = Object.keys(localStorage).some(k => k.startsWith('wf_') || k.startsWith('tracker_'));
            if (!hasData && window.WF_BACKUP_DATA && Object.keys(window.WF_BACKUP_DATA).length > 0) {
                for (const key in window.WF_BACKUP_DATA) {
                    localStorage.setItem(key, window.WF_BACKUP_DATA[key]);
                }
            }
        } catch(e) {
            if (window.WF_BACKUP_DATA) {
                window.__memory_restore_data__ = Object.assign({}, window.WF_BACKUP_DATA);
            }
        }
    })();
    </script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    
    

    // 2. Jump Buttons
    const jumpBtn = document.getElementById('global-jump-btn');
    if (jumpBtn) {
        let isAtBottom = false;
        
        const handleScroll = () => {
            const scrollTop = window.scrollY || document.documentElement.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight;
            const clientHeight = document.documentElement.clientHeight;
            
            if (scrollHeight <= clientHeight + 50) {
                jumpBtn.style.display = 'none';
                return;
            }
            
            jumpBtn.style.display = 'flex';
            
            if (scrollTop > (scrollHeight - clientHeight) / 2) {
                jumpBtn.innerText = '&#9650;';
                jumpBtn.title = 'Jump to Top';
                isAtBottom = true;
            } else {
                jumpBtn.innerText = '&#9660;';
                jumpBtn.title = 'Jump to Bottom';
                isAtBottom = false;
            }
        };
        
        jumpBtn.addEventListener('click', () => {
            if (isAtBottom) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        });
        
        window.addEventListener('scroll', handleScroll);
        window.addEventListener('resize', handleScroll);
        setTimeout(handleScroll, 100);
    }

    // 3. Navigation Sequence
                    const guideSequence = window.GUIDE_SEQUENCE || [];
    const currentFile = window.location.pathname.split('/').pop() || '!Warframe_Master_Index.html';
    let matchFile = currentFile;
    if (currentFile.toLowerCase() === 'Warframe_Tenno_Foundry.html') {
        matchFile = 'Warframe_Tenno_Foundry.html';
    }
    const currentIndex = guideSequence.findIndex(f => f.toLowerCase() === matchFile.toLowerCase());

    const prevEl = document.getElementById('nav-prev');
    const nextEl = document.getElementById('nav-next');
    const prevTopEl = document.getElementById('nav-prev-top');
    const nextTopEl = document.getElementById('nav-next-top');
    
    if (currentIndex !== -1) {
        if (currentIndex > 0) {
            if (prevEl) prevEl.href = guideSequence[currentIndex - 1];
            if (prevTopEl) {
                prevTopEl.href = guideSequence[currentIndex - 1];
                prevTopEl.classList.remove('disabled');
            }
        } else {
            if (prevEl) prevEl.classList.add('disabled');
            if (prevTopEl) prevTopEl.classList.add('disabled');
        }
        if (currentIndex < guideSequence.length - 1) {
            if (nextEl) nextEl.href = guideSequence[currentIndex + 1];
            if (nextTopEl) {
                nextTopEl.href = guideSequence[currentIndex + 1];
                nextTopEl.classList.remove('disabled');
            }
        } else {
            if (nextEl) nextEl.classList.add('disabled');
            if (nextTopEl) nextTopEl.classList.add('disabled');
        }
    } else {
        if (prevEl) prevEl.classList.add('disabled');
        if (nextEl) nextEl.classList.add('disabled');
        if (prevTopEl) prevTopEl.classList.add('disabled');
        if (nextTopEl) nextTopEl.classList.add('disabled');
    }
});

</script>
