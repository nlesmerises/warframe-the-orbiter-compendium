# 📜 The Orbiter Compendium — Version Archive

Older version history, kept for reference. The current changelog (v1.5.0 and later) lives on the [Release Notes](Release_Notes.html) page — everything below predates the 1.5.0 renumbering.

## Pre-Release Development History

The entries below record the development work incorporated into v1.0.1.

## [1.16.0] - 2026-06-29

Content expansion release — six new reference pages, a deepened guide, and an expanded cleanup tool.

### Added
- **Arcane Codex** — how arcanes work, the rank 0–5 / 21-copy system, every slot, top Warframe and weapon arcanes, Operator/Amp arcanes, and where to farm them.
- **Riven Mod Guide** — unveiling, disposition, Kuva rolling, reading a roll, and the riven trading economy.
- **Quest Codex** — every main story quest in order across four arcs (Awakening → the 1999 saga) with rewards, plus the side quests that unlock Warframes.
- **Orbiter Codex** — an orientation hub explaining your ship and every station (Arsenal, Foundry, Helminth, Transference and more), each linking to the relevant page.
- **Duviri Codex** — the Spiral and its moods, Decrees, the Circuit, Pathos Clamps, Kullervo, and Drifter Intrinsics.
- **Conservation Codex** — non-lethal hunting across all three open worlds: gear, vendors, per-world reference, and tags/floofs.

### Changed
- **Operator & Focus guide** deepened with a full per-school breakdown (key nodes and Way-Bounds) and Focus/lens farming.
- **Inventory & Space Optimizer** expanded with a "Never Sell" safeguard list, a "Prime Parts → Ducats" section, and richer Helminth and Housekeeping checklists.
- **Global search** rebuilt to 366 entries to cover the new pages.

### Fixed
- **Mechanics & Focus layout** — repaired a page where the fixed header was unclosed and several sections rendered as a top-right overlay.
- **Build versioning** — the release build now also syncs `app/assets/js/version.js`, so all version files stay aligned.

---

## [1.15.0] - 2026-06-28

Public release. Version line reset to 1.0.1 — all pre-release development builds archived.

### Fixed
- **Documentation page** (README): subtitle "Warframe: The Orbiter Compendium by Zylxyz" moved from inside the content card to the fixed top-left position, matching the style used on every other page.
- **Release Notes project name**: corrected an outdated internal reference to the current name, "Warframe: The Orbiter Compendium".

### Changed
- **Global search rebuilt**: replaced flat substring match with a weighted scorer (title exact/word-boundary/substring rank 100/70/50/10; description, tags, and page fields weighted at 60%/50%/40%; page-type entries receive a +25 boost). Per-file deduplication applied after scoring — only the highest-ranking result per page appears in the list.
- **Search index expanded**: rebuilt from 113 → 308 entries; now includes section-level headings (h2 with IDs), richer descriptions, and keyword tags.
- **Tenno Foundry layout**: search and filter controls moved into the dashboard header row alongside the acquisition stats counter; removed the hidden secret trigger button.

### Added
- **Technical Advisor credit**: Oliver Oernster credited in the Documentation page.
- **Preflight expanded to 7 checks**: added `app/assets/js/version.js` sync (Check 6) and Electron exe version verification (Check 7, skips gracefully if not yet built).
- **`run_tests.py`**: Playwright-based page validation suite — loads every page in headless Chromium and checks for JS errors and core interactive elements.
- **`verify_exe.py`**: standalone post-build Electron version verification tool.
- **Auto-rebuild gate in `build_release.py`**: search index is automatically refreshed if any HTML page is newer than `search_index.js` before a release is built.
- **Settings — Player Profile**: In-game name field, Platform selector (PC / PlayStation / Xbox / Switch), Mastery Rank slider (0–40). All saved locally and restored on every visit.
- **Settings — Storage meter**: live KB usage bar showing how much browser storage the Compendium is using, colour-coded green → amber → red.
- **Settings — Last backup timestamp**: Export now stamps the date and time; shown under the Data Management card so you always know when you last saved.
- **Settings — UI Scale**: five zoom levels (80% / 90% / 100% / 110% / 120%) — applies to the whole Compendium immediately on click and persists across pages.
- **Settings — Reduce Motion**: toggle that disables all hover animations and transitions compendium-wide; useful on low-end devices.
- **Settings — Search result limit**: choose how many results the search bar shows (5, 10, or 20).

### Changed
- Documentation (README) and Release Notes pages widened to 1400 px and left-aligned, matching the Settings page layout.
- Settings page title changed from "System Info & Documentation" to "Settings".
- Info & Docs links on Settings page reformatted as matching left-aligned cards.

## [1.14.0] - 2026-06-24

This release was brought to its finished 1.2.1 state with the generous help of **Oliver Oernster**, who carried out a meticulous, end-to-end review of the Compendium. As well as fixing a broad range of issues across the app, he designed and added several new features. With sincere thanks for the thorough and skilful work.

### Fixed
- **Broken links repaired**: the "View Docs" link, a "Backup Manager" button and a stale "Next Chapter" jump all pointed at pages that did not exist; found via a full automated link sweep and corrected.
- **Version made a single source of truth**: earlier builds had drifted across several different numbers (the changelog stopped at 1.1.34 while the code had run ahead to 1.1.39 with nothing written up for the gap); the number now lives in one file that every place reads from, so it can no longer disagree with itself.
- **Release Notes now render offline**: the markdown helper was being fetched from the internet (and failed with no connection); it is now bundled inside the app.
- **"Clear All Data" now works and is safely scoped**: it clears only the Compendium's own saved entries, never touches other data and never deletes files on disk.
- **Last online assets bundled**: the status icons and the markdown helper are now local, so the whole app works with the internet switched off.
- **Header icons now a consistent size on every page**: the Home, Settings and Site Map icons were rendering at different sizes on some pages; their sizing was moved into one shared file so all three match everywhere.
- **Weapon-page buttons aligned**: the "Customize Build" and "Print Sheet" buttons on the weapon pages no longer sit at different heights.
- **Dark theme made consistent**: a few leftover light-coloured boxes were darkened (the print styles stay light on purpose).
- **Removed a duplicate Backup Manager button** that did the same job as the Settings cog.
- **Header icons no longer flicker as you move between pages**: their final size is applied before the page first draws, so the top-left row no longer resizes on load and the Site Map button no longer pops in a moment later.
- **Stray version labels removed from page headers**: several pages carried a hardcoded version badge (such as v1.1.34) that had gone stale; the version now appears only in the single source, this changelog and the Settings page.
- **The Combat & Factions page tabs work again**: the Dashboard, Core, Open World and Specialist tabs now switch the view when clicked (they were previously inert).
- **Arsenal pages now centre their content**: the weapon detail panel was hugging the left with a wide empty gap on the right; it now sits centred in the space beside the weapon list (Meta Weapons Codex and Weapons Database).
- **The Customizer's "Save Build" button now confirms it saved**: on the Weapon Build Customizer, clicking Save Build produced no visible response and appeared to do nothing (your edits are in fact saved automatically as you make them); it now shows a clear "Build saved" confirmation with a brief highlight on the button.
- **The Arsenal weapon-type tabs now line up**: on the Meta Weapons Codex, the "Melee" tab showed its icon and label side by side while "Primary" and "Secondary" stacked the icon above the label; all three now stack consistently.
- **The Arsenal page banner is now centred**: on the Meta Weapons Codex and Weapons Database, the title banner (icon, heading and subtitle) sat against the left edge; it is now centred across the bar.
- **The Site Map page no longer nudges the layout up**: its top header was 10px shorter than every other page (it was missing the shared header-height rule), which pushed the whole page up when you opened it; the Site Map now uses the same 60px header as the rest of the app.
- **Pages no longer shift sideways when the scrollbar appears**: centred content (the Arsenal banner, the Site Map and the dashboards) slid a few pixels left the moment a page grew tall enough to show a scrollbar or when moving between a short page and a tall one; every page now reserves the scrollbar gutter up front from one shared rule, so the usable width never changes and nothing shifts.
- **Dashboard 'tray' headers are now centred and clear of the content**: the branded section bar on the dashboard pages (a hexagon badge with a section name such as 'Arsenal & Support' or 'Combat & Factions') was left-aligned; with the scrollbar gutter now reserved, a positioning quirk had begun dropping it onto the heading just below. The tray headers are now centred and sit in normal flow above the content, fixed once in the shared stylesheet.
- **Every page now uses the same header**: two pages (the Weapon Build Customizer and the Relic Tracker) still had an old text-link header; they now show the standard Home, Settings and Site Map icons plus the quick-nav row, exactly like every other page.
- **All page headers are now the same height**: a few pages had a slightly shorter top bar; the header no longer changes size as you move between pages (every page uses the same 60px header).
- **Removed the "Print Sheet" buttons**: printing is handled by the browser (Ctrl+P), so the dedicated buttons on the weapon pages and the customizer were redundant.
- **The top bar is now pixel-identical on every page**: pages each carried their own header with slightly different inline styles (one used a tighter icon gap), so the bar and its icons could shift a pixel or two as you moved between pages; the whole bar is now pinned from one shared file so nothing can differ.
- **The header icons no longer drift up or down between pages**: the emoji icons inherited each page's body font; the differing font changed their line spacing and moved the glyph 1-2px (the button stayed put, only the emoji inside moved). A fixed emoji font now renders every icon identically.
- **Removed a duplicate title from the weapon-page header**: the Meta Weapons and Weapons Database pages showed "Weapons Build Codex" in the top bar as well as in the big banner just below it, with a repeated crossed-swords icon; the top-bar copy is now hidden from one shared rule.
- **Corrected a wrong page title**: the Foundry Farming Guide showed "Warframe Meta Codex" in its header instead of the standard title.
- **The Documentation (README) page now has the standard navigation**: it had only a single "Back to Hub" link; it now carries the same top bar as every other page (Home, Settings, Site Map and the quick-nav row), so you can jump anywhere from it.
- **Internal file rename for clarity** (maintenance only; no change to how the app behaves): `safe_storage.js` is now `common.js` (it had grown well beyond storage into the whole shared header and navigation); `script.js` and `style.css` are now `dashboard.js` and `dashboard.css`; `app.js` is `warframe_data.js`; `mod_databases_split.js` is `mod_catalog.js`; `wf_checkbox_rider.js` is `tracker_keys.js`. Every page reference was updated to match.
- **Dead navigation buttons removed**: pages outside the guided reading order (dashboards, hubs, Settings and the standalone references) showed greyed-out "Prev Chapter" and "Next Chapter" buttons that never did anything; those are gone, and the chapter buttons now appear only on the guide pages where they actually work.
- **Stray button in the top-left fixed**: a handful of pages showed an unstyled arrow stuck in the top-left corner (the button was present but its styling was missing on those pages), and one page carried two dead arrows; every page now shows a single, correctly placed jump-to-top/bottom button.
- **Two near-identical mod lists merged into one** (maintenance only; nothing changes on screen): the Builds Codex loaded its own mod list (`mod_catalog.js`) that duplicated the shared list (`mod_database.js`) almost exactly; it now reads the single shared list and the duplicate file has been removed, so the two can no longer drift apart. The merge was made only after confirming the shared list already held every entry, so nothing was lost.
- **The home page now loads its shared code on the packaged copy**: the Master Index still pointed at the old name of the shared file from the earlier rename (`safe_storage.js`); it now points at the current shared file (`common.js`) like every other page.
- **The Builds Codex no longer errors on opening**: a few small helper functions for its owned-frames list (the 'active armory' picker) were referenced in the page but had not been defined, so opening it could throw an error. They are now defined with a safe default (the picker shows all your owned frames; the remove buttons work and are remembered), so the page loads cleanly.
- **Section pages let you get back to their menu again**: several guide pages show a grid of tiles that open a section (the Inventory & Space Optimizer's 'Weapons Hit-List' and 'Helminth Safeguard', plus the farming guides, Steel Path Audit and others). Opening a section had become a one-way trip: the 'Return to Index' button failed to appear and the Back button jumped to the previous page instead of the tile menu. A single mistyped word in the shared section code (left behind by an earlier file rename) was throwing an error on every one of these pages; it is corrected across all of them, so the 'Return to Index' button is back and the Back button returns to the menu.
- **The Inventory & Space Optimizer's Helminth and Housekeeping sections show their content again**: on that page, two of the four sections (Helminth Safeguard and Housekeeping) had been built nested inside the first section (Weapons Hit-List) rather than alongside it, so opening them showed a blank page. The sections are now siblings, so all four open correctly. This only became noticeable once the tile navigation above was fixed.
- **The Back button now works on the Dashboard-style pages**: pages whose filename contains "Dashboard" (such as the Warframe Dashboard reached from the Core Codex hub) handled their Back button differently from every other page: it ignored the in-app history that records where you came from, so it stayed dead even when there was an obvious page to return to. The other destinations from the same hub worked fine. These pages now use the same history-aware Back as the rest of the app, so the button lights up and returns you to the previous page like everywhere else.

### Added
- **A new Site Map page, with a map button on every page** (top-left, beside the cog) that opens a grouped map of the whole app.
- **Hover highlights and labels on the top controls**, so Home, Settings, Site Map and the Prev/Next buttons show what they do when you point at them.
- **A proper Documentation (README) page**, so "View Docs" now opens real documentation.
- **A single-source chapter order**: the Prev/Next sequence now lives in one list that every page reads, replacing twelve copies that had drifted out of step.
- **A persistent quick-nav row in the header**: one-tap emoji shortcuts to the main areas (Getting Started, Arsenal, Mods & Arcanes, Farming & Economy, Combat & Mechanics, Endgame and Tools), shown after a divider on every page with the same hover label and teal highlight as the home, settings and site-map icons.
- **The header adapts to smaller screens**: on laptops and narrower viewports (1366px and below) it shrinks the icons, hides the long branding title and compacts the Prev/Next buttons so the whole control row keeps fitting on one line; wide screens are unchanged.
- **Back and Forward on every page**: the browser-history Back and Forward buttons now appear in the header consistently on every page (several pages were missing them).
- **The whole header navigation now comes from one shared file**: the Prev / Back / Forward / Next row, the jump-to-top/bottom button, their sizing and the rule that switches Back and Forward off on menu pages were each copied onto every page before; they are now defined once and applied everywhere, so they cannot drift, go missing or fall out of step again.
- **"Drop Tables" page renamed for clarity**: the Warframe loot drop-tables reference (which missions and enemies drop which items) was named in a way that read like a database command; it is now plainly "Drop Tables" and shows a Home button when opened on its own.
