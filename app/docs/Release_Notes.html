# 📚 The Orbiter Compendium — Changelog

All notable changes to the Warframe: The Orbiter Compendium project will be documented in this file.

## Versioning

This project follows Semantic Versioning (MAJOR.MINOR.PATCH). The rules, in force going forward:

- The version number only ever increases. A number is never reused, reset, or reordered.
- A release that adds pages or features bumps the MINOR number (the middle one) and resets PATCH to 0.
- A release that only fixes bugs or does cosmetic cleanup bumps the PATCH number (the last one).
- MAJOR (the first number) is reserved for a full redesign or a change that breaks saved data or existing bookmarks.
- The single source of truth is the `VERSION` file. The root `version.js` and `app/assets/js/version.js` must always match it.

The version history prior to this policy was not consistently SemVer-compliant (numbers were sometimes reused or bumped on the wrong digit for feature releases). Rather than freeze that inconsistency, the entire historical sequence was renumbered once (2026-07-09) to real SemVer, start to finish, so every past release now carries an accurate classification. See the [Version Archive](Version_Archive.html) for anything before this file's oldest entry.

## [1.29.0] - 2026-07-14

### Added
- **Nested category registry replacing the old flat category system.** `common.js` now models the header's 8 categories (Getting Started, Warframes, Arsenal, Mods & Arcanes, Farming & Economy, Combat & Mechanics, Endgame & Activities, Tools & Maintenance) as a real parent-pointer registry (`CODEX_REGISTRY`), with sub-groups for pages that warrant a deeper breadcrumb level: Arsenal ("Melee & Combos", "Companions & Vehicles"), Getting Started ("The Tenno Path"), Farming & Economy ("Foundry", "Trading & Syndicates", "Relics", "Live Feeds"), and Endgame & Activities ("Open Worlds & Story", "Vehicles", "Story Companions", "Trackers").
- **Full-coverage clickable breadcrumb** built by walking the registry from any page up to Home, replacing the old one-level "Home / Page" trail. Pages nested inside a sub-group get a real 4-segment trail.
- **Quick-nav hover dropdowns** on every header category icon, listing every page in that category (not just its landing page).
- **Active-page icon highlight** in the header, so the current section is visually obvious at a glance.
- **`preflight_check.py` CHECK 13** — verifies every real page under `app/` is reachable from the header's category registry, and every registered filename actually exists on disk. Catches silent drift between the nav system and the file tree going forward.

### Changed
- **Master Index rebuilt around the same 8-category system as the header**, replacing 6 old cards (each of which linked to its own separate hub/dashboard page) with 8 new ones matching the header's names, icons, and colors exactly, each linking straight to that category's real landing page.
- Site Map moved out of the header icon row into Settings (low-frequency navigation tool, not a primary action).
- 5 pages recategorized to match their actual content rather than where they happened to sit historically: `Mission_Types_Guide` → Getting Started, `Helminth_Synergy_App` → Endgame & Activities, `Drop_Tables` and `Farming_Codex_App` → Farming & Economy, `Tenet_Kuva_Weapons_Guide` → Arsenal.
- Title, breadcrumb, and search bar now align to the real content panel's edges (read at runtime via `getBoundingClientRect`) instead of hardcoded viewport pixel offsets that never lined up with the panel or with each other.

### Removed
- **6 orphaned hub/dashboard pages deleted** after a full-content audit confirmed each had zero unique content — every link on them already resolved to a page reachable via the new category system: `Warframe_Core_Dashboard.html`, `Warframe_Endgame_Dashboard.html`, `Warframe_Systems_Dashboard.html`, `Warframe_Core_Codex_Hub.html`, `Warframe_Arsenal_Dashboard.html`, `Warframe_Economy_Dashboard.html`. Resulting dead links across `Warframe_Site_Map.html` and 4 content pages repointed.
- The 3 remaining hub/dashboard pages with real unique content (`Warframe_Live_Network_Hub.html`, `Warframe_Dashboard.html`, `Warframe_Active_Projects_Farming_Hub.html`) were registered into the category system rather than deleted.

### Fixed
- **Title truncated almost immediately at non-maximized window widths** ("Warfra...") — the banner's `max-width` was a fixed `calc(100vw - 600px)` guess; now computed from the real gap between the banner and wherever the search bar actually starts.
- **`Warframe_Live_Network_Hub.html` had 425 bytes of trailing null-byte corruption** after its closing `</html>` tag (harmless to rendering, real file corruption) — trimmed.
- Removed a genuinely redundant fixed `width:1750px` (alongside `max-width:1750px`) on 2 pages without a flex-positioned body (`Warframe_Fishing_Companion_Codex.html`, `_page_template.html`); confirmed via live testing that 8 other pages sharing the same pattern actually need it (their `display:flex` body would otherwise shrink the panel to content size) and left those alone.

## [1.28.0] - 2026-07-13

### Changed
- **Header nav cluster redesigned to icon-only, per Nelson's request.** Prev/Back/Forward/Next Chapter dropped their visible text labels and boxed borders — now plain chevron icons matching the Home/Settings/quick-nav icon language sitewide, with a hover tooltip (teal outline + label, same convention as the other header icons) instead of always-visible text. Icon size and stroke weight increased for better visibility now that the text is gone.
- **Jump-to-top/bottom control moved from a floating bottom-right circle into the header nav cluster**, as the fifth icon after Next Chapter. Reuses the same `a.nav-btn-top` styling wholesale (no separate style block), so it automatically inherits the navbar's own icon size and gap spacing and can't visually drift from the other four nav icons. Fixed a real timing bug in the process: the button's "is this page scrollable" check ran once immediately on page load, before some pages' async-loaded content (e.g. the Mods Database's fetched grid) had rendered, so it could wrongly decide a long page was too short to scroll and never re-check. Added a delayed re-check to catch this.
- Bumped `common.js` cache-buster to `?v=10` on all 84 pages (was inconsistently `?v=9` or missing) so the above changes take effect everywhere immediately rather than silently continuing to serve the old cached script on some pages.

### Fixed
- **`a.nav-btn-top` box border was two competing style sources, not one** — a newer `BTN_STYLE` inline-style constant said no border, but a separate `!important`-flagged CSS block elsewhere in `common.js` (deliberately centralized specifically to prevent per-page drift) still set a visible 1px border and was silently winning every time, since `!important` beats inline style regardless of which one is "correct." This is why past attempts to change the button look never visibly took effect. Removed the border from the winning rule.
- **Forward button was hardcoded hidden (`display:none!important`) on 4 `app/docs/*.html` pages** (`README.html`, `Release_Notes.html`, `Version_Archive.html`, `Dev_History_Archive.html`) via an old page-local `<style>` override, predating `common.js`'s centralized nav cluster. Caused a visible layout gap/misalignment in the header on exactly those 4 pages, and meant Forward silently didn't exist there at all while working everywhere else. Removed all 4 overrides so Back/Forward behave identically on every page, no exceptions.
- **Mods Database `filterMods()` was missing 7 of 16 category branches** — `weapon`, `warframe`, `companion`, `focus`, `stance`, `plexus`, and `miscvehicle` had no match logic in the search-filter function, only in the separate `renderCategoryPanel()` function that the category-card click path actually uses. Not currently reachable by any live UI path (category cards route through the correct function), but a landmine for any future code path that reuses `filterMods()` with those tabs active. Brought both functions' category logic back in sync.
- **App title banner crowded the content box on all 4 `app/docs/*.html` pages** — the shared amber title banner (`common.js`) sits at `top:90px` with a 30px font (~35px tall), and each docs page's own `body{padding-top:120px}` started the content box right where the banner ended, leaving only ~5px of clearance. Increased top padding to 150px on `README.html`, `Release_Notes.html`, `Version_Archive.html`, `Dev_History_Archive.html` for real breathing room.

## [1.27.5] - 2026-07-12

### Fixed
- **Nebula background missed 2 pages** — `Warframe_Core_Codex_Hub.html` and `Warframe_Endgame_Dashboard.html` each had their own page-local `body{}` background override (duplicate radial-gradient, loading after the shared stylesheet and winning the cascade), silently blocking the sitewide nebula background added in 1.27.4 on exactly these two pages. Found via a sitewide scan for any page-local `body{}` rule with its own `background-image`. Removed both overrides so the shared rule applies.
- **`app/docs/*.html` pages were missed by every cache-buster bump in 1.27.4** — those bumps only targeted `app/*.html` directly, leaving the five documentation pages pinned to `common.js?v=3` and `codex_glass_theme.css?v=7`, predating all of 1.27.4's fixes. Bumped to match every other page.
- **Preflight `Check 4` false positive** — the CDN/offline-risk scan matched any `href=`/`src=` attribute, so the Discord/GitHub contact links on `License_Agreement.html` (plain `<a href>` navigation links, not loaded resources) were flagged as offline-breaking dependencies. Narrowed the regex to only match `<link href>`, `<script src>`, `<img src>`, `<iframe src>`.
- **Arsenal quick-nav icon vertical alignment** — the 🔫 gun emoji's artwork sits low within its own character cell (same class of issue as the previously-documented Site Map glyph, different axis), reading visibly lower than the other 10 top-bar icons despite its bounding box being correctly positioned. Nudged via `transform:translateY(-6px)`, targeted at just that one icon.
